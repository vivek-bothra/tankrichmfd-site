<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tankrich MFD – Contact Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="navbar-container">
      <div class="logo"><a href="index.html">Tankrich MFD</a></div>
      <button class="nav-toggle" aria-expanded="false" aria-controls="contact-nav" aria-label="Toggle navigation">☰</button>
      <nav id="contact-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="info.html">Info</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section style="min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 2rem;">
    <h2 class="section-title" style="text-align:center;">We’d love to hear from you</h2>
    <p style="text-align:center; max-width:600px; margin-bottom:2rem; color:#465262;">If you have any questions or would like to learn more about our services, please drop us a line. We’re here to help you navigate your investment journey.</p>
    <div class="btn-group">
      <a href="https://www.assetplus.in/mfd/ARN-331582" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Sign Up</a>

  <footer>
    <p>&copy; 2025 Tankrich MFD</p>
    <p><a href="index.html">Home</a> | <a href="info.html">Info</a></p>
  </footer>

  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('nav');
    if (navToggle && nav) {
      navToggle.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }
  </script>
</body>
</html>
